name: CI - Validación del Proyecto

on:
  push:
    branches:
      - main
      - feature-ci
      - feature-ci-advanced
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Ejecutar validación
        id: validacion
        run: python automation/validate_project.py

      - name: Mensaje de éxito
        if: success()
        run: echo "✅ Todo correcto, el proyecto pasó todas las validaciones"

      - name: Mensaje de error
        if: failure()
        run: echo "❌ Error, el proyecto no pasó las validaciones"